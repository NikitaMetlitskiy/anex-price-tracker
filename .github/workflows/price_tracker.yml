name: Anex Price Tracker 🛒

on:
  schedule:
    - cron: "0 7 * * *"    # 10:00 Київ (UTC+3)
    - cron: "0 15 * * *"   # 18:00 Київ (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests playwright

      - name: 🌐 Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: 📂 Restore price history
        uses: actions/cache@v4
        with:
          path: prices_history.json
          key: prices-history-${{ github.run_id }}
          restore-keys: |
            prices-history-

      - name: 🔍 Run price tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python anex_tracker.py

      - name: 💾 Save updated price history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: prices_history.json
          key: prices-history-${{ github.run_id }}

      - name: 🌐 Commit prices.json для сайту
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date +'%d.%m.%Y %H:%M')"
          git push
